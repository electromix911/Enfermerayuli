<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Mi Blakita Bella 💙</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#001f3f,#0074D9,#7FDBFF);
      color:white;
      text-align:center;
      position:relative;
    }

    .container{
      z-index:2;
      padding:20px;
    }

    h1{
      font-size:3rem;
      margin-bottom:15px;
      animation: brillo 2s infinite alternate;
    }

    p{
      font-size:1.3rem;
      margin-bottom:25px;
    }

    button{
      padding:15px 35px;
      border:none;
      border-radius:50px;
      background:white;
      color:#0074D9;
      font-size:1.2rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 20px rgba(255,255,255,0.5);
    }

    button:hover{
      transform:scale(1.1);
      background:#7FDBFF;
      color:white;
    }

    .sorpresa{
      display:none;
      margin-top:30px;
      animation: aparecer 1.5s ease;
    }

    .sorpresa img{
      width:260px;
      border-radius:25px;
      border:5px solid white;
      box-shadow:0 0 30px rgba(255,255,255,0.8);
    }

    .texto{
      margin-top:20px;
      font-size:2rem;
      color:#ffffff;
      text-shadow:0 0 15px #7FDBFF;
    }

    @keyframes aparecer{
      from{
        opacity:0;
        transform:scale(0.5);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @keyframes brillo{
      from{
        text-shadow:0 0 10px #fff;
      }
      to{
        text-shadow:0 0 25px #7FDBFF;
      }
    }

    /* Corazones */
    .heart{
      position:absolute;
      color:#7FDBFF;
      font-size:25px;
      animation: flotar 6s linear infinite;
      opacity:0.8;
    }

    @keyframes flotar{
      0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
      }
      50%{
        opacity:1;
      }
      100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
      }
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>💙 ¿Cuándo salimos, blakita bella? 💙</h1>

    <p>
      Tengo ganas de verte, hablar contigo y pasar un momento bonito contigo ✨
    </p>

    <button onclick="mostrarSorpresa()">
      Presióname 💌
    </button>

    <div class="sorpresa" id="sorpresa">
      <!-- CAMBIA "foto.jpg" POR EL NOMBRE DE SU FOTO -->
      <img src="foto.jpg" alt="Ella">

      <div class="texto">
        💙 Mi futura enfermera favorita 💙<br>
        La más bonita de todas ✨
      </div>
    </div>
  </div>

  <script>

    function mostrarSorpresa(){
      document.getElementById("sorpresa").style.display = "block";

      for(let i=0;i<35;i++){
        crearCorazon();
      }
    }

    function crearCorazon(){
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💙";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random()*3 + 3) + "s";
      heart.style.fontSize = (Math.random()*25 + 20) + "px";

      document.body.appendChild(heart);

      setTimeout(()=>{
        heart.remove();
      },6000);
    }

  </script>

</body>
</html>
